# @template: tactical-design
# 使用说明：复制此模板，替换 <...> 占位符

context: <限界上下文名称>

aggregates:
  - name: <聚合根名称>
    root_entity:
      class: <类名>
      identity:
        type: <ID 类型：UUID/Long/Composite>
        generation: <生成策略：client/server/db>
        example: <示例值>
    entities:
      - class: <实体类名>
        identity: <ID 类型>
        lifecycle_rules:
          - "<创建规则>"
          - "<变更规则>"
          - "<销毁规则>"
    value_objects:
      - class: <值对象类名>
        attributes:
          - {name: <字段名>, type: <类型>, constraint: <校验规则>}
        immutable: true
        behaviors: [<业务方法 1>, <业务方法 2>]
    invariants:
      - rule: <业务规则描述>
        enforced_by: <负责校验的领域方法名>
        error_condition: <违反时的处理>
        test_case: "<单元测试用例描述>"
    domain_events:
      - name: <EventName>
        trigger: "<触发时机>"
        payload:
          - {field: <字段名>, type: <类型>, source: <来源>}
        consumers: [<下游上下文/外部系统>]
        idempotency_key: <幂等键字段>
    methods:
      - name: <业务方法名>
        purpose: <业务意图>
        signature: "<参数列表> -> <返回类型>"
        preconditions: [<前置条件>]
        side_effects: [<状态变更>, <发布的事件>]
        idempotent: true|false

application_services:
  - usecase: <用例名称>
    description: <业务价值描述>
    actor: <触发角色：user/system/schedule>
    input_dto:
      class: <请求类名>
      fields:
        - {name: <字段>, type: <类型>, required: true|false, validation: <校验规则>}
    orchestration:
      - step: 1
        action: <动作>
        component: <负责组件>
        transaction: in|out|none
    output_dto:
      class: <响应类名>
      fields: [{name: , type: , description: }]
    error_handling:
      - condition: <错误条件>
        response: <处理>
    transaction_boundary: "<事务开始> -> <事务结束>"

infrastructure_concerns:
  repository:
    interface_location: domain.layer
    implementation: <技术选型>
    query_methods: [<方法 1>, <方法 2>]
  event_publishing:
    mechanism: <同步/异步/Outbox>
    guarantee: <至少一次/恰好一次>
    serialization: <JSON/Protobuf/Avro>